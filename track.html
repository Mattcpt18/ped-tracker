<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Build Cycle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F172A">
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

  <style>
    /* Tikn animation */
    @keyframes tikn {
      0% { transform: scale(1) rotate(0deg); }
      30% { transform: scale(1.15) rotate(8deg); }
      60% { transform: scale(0.9) rotate(-6deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .tikn { animation: tikn 0.4s ease-out; }

    /* Small upper-right logo */
    .top-right-logo {
      position: absolute;
      top: 16px;
      right: 16px;
    }
    .top-right-logo img {
      width: 48px;
      height: auto;
      border-radius: 10px;
      cursor: pointer;
    }

    /* Calendar grid */
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 20px;
    }
    .day {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 10px;
      border-radius: 10px;
      color: #e5e7eb;
      text-align: center;
      min-height: 60px;
      font-size: 14px;
    }
    .dose-day {
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
    }
    .today {
      border: 2px solid #facc15;
    }

    .row-card {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <!-- Upper-right logo -->
  <div class="top-right-logo">
    <img id="protocolLogo" src="protocol-logo.png" alt="Protocol Logo">
  </div>

  <div class="track-container">
    <h1 class="track-title">Build Cycle</h1>

    <!-- 10 Compound Rows -->
    <div id="compoundRows"></div>

    <!-- Cycle Info -->
    <div class="protocol-card">
      <h2>Cycle Info</h2>

      <label>Cycle Duration (weeks):</label>
      <input id="cycleDuration" type="number" placeholder="Weeks">

      <label>Start Date:</label>
      <input id="startDate" type="date">
    </div>

    <div class="protocol-actions">
      <button onclick="buildCycle()">Build Cycle</button>
      <button onclick="location.href='index.html'">Back to Home</button>
    </div>

    <div id="calendarOutput"></div>
  </div>

  <!-- Locked compound list -->
  <script src="compound-management.js"></script>

  <script>
    /* ------------------------------------------------------------
       Generate 10 rows dynamically
       ------------------------------------------------------------ */
    const rowsContainer = document.getElementById("compoundRows");

    for (let i = 1; i <= 10; i++) {
      const row = document.createElement("div");
      row.className = "row-card";

      row.innerHTML = `
        <h3>Compound ${i}</h3>

        <label>Compound:</label>
        <select class="compoundDropdown"></select>

        <label>Weekly Dose (mg):</label>
        <input class="weeklyDose" type="number" placeholder="mg">

        <label>Frequency (times per week):</label>
        <input class="frequency" type="number" placeholder="Times per week">

        <label>Dose per ml (mg/ml):</label>
        <input class="dosePerMl" type="number" placeholder="mg/ml">
      `;

      rowsContainer.appendChild(row);
    }

    /* ------------------------------------------------------------
       Sync dropdowns after rows are created
       ------------------------------------------------------------ */
    document.addEventListener("DOMContentLoaded", () => {
      const dropdowns = document.querySelectorAll(".compoundDropdown");
      dropdowns.forEach(dd => updateDropdown(dd));
    });

    /* ------------------------------------------------------------
       Logo click animation + return home
       ------------------------------------------------------------ */
    const logo = document.getElementById("protocolLogo");
    logo.addEventListener("click", () => {
      logo.classList.remove("tikn");
      void logo.offsetWidth;
      logo.classList.add("tikn");
      setTimeout(() => {
        location.href = "index.html";
      }, 300);
    });

    /* ------------------------------------------------------------
       Build Cycle (Calendar for all compounds)
       ------------------------------------------------------------ */
    function buildCycle() {
      const cycleDuration = Number(document.getElementById("cycleDuration").value);
      const startDate = document.getElementById("startDate").value;

      if (!cycleDuration || !startDate) {
        alert("Please fill out cycle duration and start date.");
        return;
      }

      const start = new Date(startDate);
      const totalDays = cycleDuration * 7;

      const calendarDiv = document.getElementById("calendarOutput");
      calendarDiv.innerHTML = "<h2>Cycle Calendar</h2>";

      const calendarGrid = document.createElement("div");
      calendarGrid.className = "calendar";

      const rows = document.querySelectorAll(".row-card");

      const doseMap = {}; // day → array of doses

      rows.forEach(row => {
        const compound = row.querySelector(".compoundDropdown").value;
        const weeklyDose = Number(row.querySelector(".weeklyDose").value);
        const frequency = Number(row.querySelector(".frequency").value);
        const dosePerMl = Number(row.querySelector(".dosePerMl").value);

        if (!compound || !weeklyDose || !frequency || !dosePerMl) return;

        const doseMg = weeklyDose / frequency;
        const doseMl = (doseMg / dosePerMl).toFixed(2);

        const interval = Math.floor(7 / frequency);

        for (let i = 0; i < totalDays; i += interval) {
          if (!doseMap[i]) doseMap[i] = [];
          doseMap[i].push({ compound, doseMg, doseMl });
        }
      });

      for (let i = 0; i < totalDays; i++) {
        const dayDate = new Date(start);
        dayDate.setDate(start.getDate() + i);

        const dayDiv = document.createElement("div");
        dayDiv.className = "day";

        if (doseMap[i]) {
          dayDiv.classList.add("dose-day");

          let html = `${dayDate.toDateString()}<br>`;
          doseMap[i].forEach(d => {
            html += `${d.compound}: ${d.doseMg} mg (${d.doseMl} ml)<br>`;
          });

          dayDiv.innerHTML = html;
        } else {
          dayDiv.innerHTML = dayDate.toDateString();
        }

        const today = new Date();
        if (
          dayDate.getFullYear() === today.getFullYear() &&
          dayDate.getMonth() === today.getMonth() &&
          dayDate.getDate() === today.getDate()
        ) {
          dayDiv.classList.add("today");
        }

        calendarGrid.appendChild(dayDiv);
      }

      calendarDiv.appendChild(calendarGrid);
    }
  </script>

</body>
</html>
