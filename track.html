<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Protocol Tracker – Track</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
</script>

<style>
  body {
    margin: 0;
    background: #020617;
    color: #e5e7eb;
    font-family: system-ui, sans-serif;
  }

  /* MAIN SCREEN */
  .center-screen {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    gap: 20px;
  }

  .main-btn {
    background: #1e293b;
    border: 1px solid #334155;
    padding: 18px 26px;
    border-radius: 14px;
    font-size: 20px;
    color: #e5e7eb;
    cursor: pointer;
    width: 70%;
    text-align: center;
  }

  .main-btn:hover {
    background: #38bdf8;
    color: #0f172a;
  }

  /* ADD PROTOCOL SCREEN */
  .screen {
    display: none;
    padding: 20px;
  }

  .item-row {
    background: #1e293b;
    border: 1px solid #334155;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 12px;
  }

  .item-row input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 10px;
    background: #0f172a;
    border: 1px solid #334155;
    color: #e5e7eb;
  }

  .save-btn {
    background: #38bdf8;
    color: #0f172a;
    padding: 16px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    text-align: center;
  }

  /* CALENDAR */
  .calendar {
    display: none;
    padding: 20px;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .day-box {
    background: #1e293b;
    border: 1px solid #334155;
    padding: 10px;
    border-radius: 10px;
    min-height: 120px;
    font-size: 12px;
  }

  .day-box strong {
    display: block;
    margin-bottom: 6px;
  }
</style>
</head>
<body>

<!-- MAIN SCREEN -->
<div id="main-screen" class="center-screen">
  <div id="my-protocol-btn" class="main-btn">My Protocol</div>
  <div id="add-protocol-btn" class="main-btn">Add Protocol</div>
</div>

<!-- ADD PROTOCOL SCREEN -->
<div id="add-screen" class="screen">
  <h2>Add Protocol</h2>

  <div id="item-list"></div>

  <div class="save-btn" id="save-protocol">Save Protocol</div>
</div>

<!-- CALENDAR SCREEN -->
<div id="calendar-screen" class="calendar">
  <h2>My Protocol Calendar</h2>
  <div id="calendar-grid" class="calendar-grid"></div>
</div>

<script>
/* NAVIGATION */
const mainScreen = document.getElementById("main-screen");
const addScreen = document.getElementById("add-screen");
const calendarScreen = document.getElementById("calendar-screen");

document.getElementById("add-protocol-btn").onclick = () => {
  mainScreen.style.display = "none";
  addScreen.style.display = "block";
};

document.getElementById("my-protocol-btn").onclick = () => {
  const saved = localStorage.getItem("protocol");
  if (!saved) {
    alert("No protocol saved yet.");
    return;
  }
  loadCalendar(JSON.parse(saved));
  mainScreen.style.display = "none";
  calendarScreen.style.display = "block";
};

/* BUILD ADD PROTOCOL FORM */
const itemList = document.getElementById("item-list");

for (let i = 0; i < 10; i++) {
  const row = document.createElement("div");
  row.className = "item-row";
  row.innerHTML = `
    <input placeholder="Item name (you fill later)">
    <input placeholder="Weekly dose">
    <input placeholder="Frequency per week">
    <input placeholder="Dose per mL">
  `;
  itemList.appendChild(row);
}

/* SAVE PROTOCOL */
document.getElementById("save-protocol").onclick = () => {
  const items = [];

  document.querySelectorAll(".item-row").forEach(row => {
    const fields = row.querySelectorAll("input");
    const name = fields[0].value.trim();
    const weekly = fields[1].value.trim();
    const freq = fields[2].value.trim();
    const perml = fields[3].value.trim();

    if (name && weekly && freq && perml) {
      items.push({
        name,
        weekly: Number(weekly),
        freq: Number(freq),
        perml: Number(perml)
      });
    }
  });

  if (items.length === 0) {
    alert("Add at least one item.");
    return;
  }

  localStorage.setItem("protocol", JSON.stringify(items));

  alert("Protocol saved.");
  addScreen.style.display = "none";
  mainScreen.style.display = "flex";
};

/* CALENDAR GENERATION */
function loadCalendar(items) {
  const grid = document.getElementById("calendar-grid");
  grid.innerHTML = "";

  const days = 30; // default 30-day calendar
  for (let d = 1; d <= days; d++) {
    const box = document.createElement("div");
    box.className = "day-box";
    box.innerHTML = `<strong>Day ${d}</strong>`;

    items.forEach(item => {
      if ((d % Math.floor(7 / item.freq)) === 0) {
        box.innerHTML += `
          <div>${item.name}<br>${item.weekly}mg/week</div>
        `;
      }
    });

    grid.appendChild(box);
  }
}
</script>

</body>
</html>
