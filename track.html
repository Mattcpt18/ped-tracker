<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Protocol Tracker – Track</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
</script>

<style>
  body {
    margin: 0;
    background: #020617;
    color: #e5e7eb;
    font-family: system-ui, sans-serif;
  }

  .center-screen {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    gap: 20px;
  }

  .main-btn {
    background: #1e293b;
    border: 1px solid #334155;
    padding: 18px 26px;
    border-radius: 14px;
    font-size: 20px;
    color: #e5e7eb;
    cursor: pointer;
    width: 70%;
    text-align: center;
  }

  .main-btn:hover {
    background: #38bdf8;
    color: #0f172a;
  }

  .corner-buttons {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .corner-btn {
    background:#1e293b;
    border:1px solid #334155;
    padding:8px 12px;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
    text-align:center;
  }

  .corner-btn:hover {
    background:#38bdf8;
    color:#0f172a;
  }

  .screen {
    display: none;
    padding: 20px;
  }

  .item-row {
    background: #1e293b;
    border: 1px solid #334155;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 12px;
  }

  .item-row input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 10px;
    background: #0f172a;
    border: 1px solid #334155;
    color: #e5e7eb;
  }

  .save-btn {
    background: #38bdf8;
    color: #0f172a;
    padding: 16px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    text-align: center;
  }

  .calendar {
    display: none;
    padding: 20px;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .day-box {
    background: #1e293b;
    border: 1px solid #334155;
    padding: 10px;
    border-radius: 10px;
    min-height: 120px;
    font-size: 12px;
  }

  .day-box strong {
    display: block;
    margin-bottom: 6px;
  }
</style>
</head>

<body>

<div class="corner-buttons">
  <div id="remove-protocol" class="corner-btn">Remove</div>
  <div id="export-protocol" class="corner-btn">Export</div>
  <div id="edit-protocol" class="corner-btn">Edit</div>
</div>

<div id="main-screen" class="center-screen">
  <div id="my-protocol-btn" class="main-btn">My Protocol</div>
  <div id="add-protocol-btn" class="main-btn">Add Protocol</div>
</div>

<div id="add-screen" class="screen">
  <h2 id="form-title">Add Protocol</h2>
  <div id="item-list"></div>
  <div class="save-btn" id="save-protocol">Save Protocol</div>
</div>

<div id="calendar-screen" class="calendar">
  <h2>My Protocol Calendar</h2>
  <div id="calendar-grid" class="calendar-grid"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const view = params.get("view");

const mainScreen = document.getElementById("main-screen");
const addScreen = document.getElementById("add-screen");
const calendarScreen = document.getElementById("calendar-screen");
const formTitle = document.getElementById("form-title");
const itemList = document.getElementById("item-list");

const itemColors = [
  "#38bdf8","#34d399","#fbbf24","#f87171","#a78bfa",
  "#fb7185","#4ade80","#f97316","#2dd4bf","#60a5fa"
];

if (view === "addprotocol") openAddScreen(false);
else if (view === "editprotocol") openAddScreen(true);
else if (view === "myprotocol") {
  const saved = localStorage.getItem("protocol");
  if (saved) {
    loadCalendar(JSON.parse(saved));
    mainScreen.style.display = "none";
    calendarScreen.style.display = "block";
  }
}

document.getElementById("add-protocol-btn").onclick = () => openAddScreen(false);
document.getElementById("my-protocol-btn").onclick = () => {
  const saved = localStorage.getItem("protocol");
  if (!saved) return alert("No protocol saved.");
  loadCalendar(JSON.parse(saved));
  mainScreen.style.display = "none";
  calendarScreen.style.display = "block";
};

document.getElementById("edit-protocol").onclick = () => {
  const saved = localStorage.getItem("protocol");
  if (!saved) return alert("No protocol saved to edit.");
  openAddScreen(true);
};

document.getElementById("remove-protocol").onclick = () => {
  if (confirm("Remove saved protocol?")) {
    localStorage.removeItem("protocol");
    alert("Protocol removed.");
  }
};

document.getElementById("export-protocol").onclick = () => {
  const saved = localStorage.getItem("protocol");
  if (!saved) return alert("No protocol saved.");

  const items = JSON.parse(saved);
  let csv = "Item,Weekly Dose,Frequency,Per mL,mL per dose\n";
  items.forEach(i => {
    csv += `${i.name},${i.weekly},${i.freq},${i.perml},${i.mlPerDose.toFixed(2)}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "protocol.csv";
  a.click();
  URL.revokeObjectURL(url);
};

function openAddScreen(isEdit) {
  mainScreen.style.display = "none";
  calendarScreen.style.display = "none";
  addScreen.style.display = "block";

  formTitle.textContent = isEdit ? "Edit Protocol" : "Add Protocol";
  itemList.innerHTML = "";

  if (isEdit) {
    const saved = JSON.parse(localStorage.getItem("protocol") || "[]");
    saved.forEach(item => {
      const row = document.createElement("div");
      row.className = "item-row";
      row.innerHTML = `
        <input value="${item.name}">
        <input value="${item.weekly}">
        <input value="${item.freq}">
        <input value="${item.perml}">
      `;
      itemList.appendChild(row);
    });
  } else {
    for (let i = 0; i < 10; i++) {
      const row = document.createElement("div");
      row.className = "item-row";
      row.innerHTML = `
        <input placeholder="Item name">
        <input placeholder="Weekly dose (mg)">
        <input placeholder="Frequency per week">
        <input placeholder="Dose per mL (mg/mL)">
      `;
      itemList.appendChild(row);
    }
  }
}

document.getElementById("save-protocol").onclick = () => {
  const items = [];
  document.querySelectorAll(".item-row").forEach((row, index) => {
    const fields = row.querySelectorAll("input");
    const name = fields[0].value.trim();
    const weekly = Number(fields[1].value.trim());
    const freq = Number(fields[2].value.trim());
    const perml = Number(fields[3].value.trim());

    if (name && weekly && freq && perml) {
      const mlPerDose = weekly / (freq * perml);
      items.push({
        name,
        weekly,
        freq,
        perml,
        mlPerDose,
        color: itemColors[index % itemColors.length]
      });
    }
  });

  if (items.length === 0) return alert("Add at least one item.");

  localStorage.setItem("protocol", JSON.stringify(items));
  alert("Protocol saved.");
  addScreen.style.display = "none";
  mainScreen.style.display = "flex";
};

function loadCalendar(items) {
  const grid = document.getElementById("calendar-grid");
  grid.innerHTML = "";
  const days = 30;

  items.forEach(item => {
    item.interval = Math.ceil(7 / item.freq);
  });

  for (let d = 1; d <= days; d++) {
    const box = document.createElement("div");
    box.className = "day-box";
    box.innerHTML = `<strong>Day ${d}</strong>`;

    items.forEach(item => {
      if ((d - 1) % item.interval === 0) {
        box.innerHTML += `
          <div style="border-left:4px solid ${item.color}; padding-left:6px; margin-bottom:6px;">
            <span style="color:${item.color}; font-weight:600;">${item.name}</span><br>
            ${item.mlPerDose.toFixed(2)} mL per dose
          </div>
        `;
      }
    });

    grid.appendChild(box);
  }
}
</script>

</body>
</html>
