<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Protocol</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F172A">
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

  <style>
    /* Fun tikn animation */
    @keyframes tikn {
      0% { transform: scale(1) rotate(0deg); }
      30% { transform: scale(1.15) rotate(8deg); }
      60% { transform: scale(0.9) rotate(-6deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .tikn {
      animation: tikn 0.4s ease-out;
    }

    /* Smaller upper-right logo */
    .top-right-logo {
      position: absolute;
      top: 16px;
      right: 16px;
    }

    .top-right-logo img {
      width: 48px;
      height: auto;
      border-radius: 10px;
      cursor: pointer;
    }

    /* Calendar grid */
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 20px;
    }

    .day {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 10px;
      border-radius: 10px;
      color: #e5e7eb;
      text-align: center;
      min-height: 60px;
      font-size: 14px;
    }

    .dose-day {
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
    }

    .today {
      border: 2px solid #facc15;
    }
  </style>
</head>

<body>

  <!-- Upper-right logo -->
  <div class="top-right-logo">
    <img id="protocolLogo" src="protocol-logo.png" alt="Protocol Logo">
  </div>

  <div class="track-container">
    <h1 class="track-title">Track Protocol</h1>

    <!-- Compound selection -->
    <div class="protocol-card">
      <h2>Compound</h2>

      <label>Select Compound:</label>
      <select id="compoundDropdown"></select>

      <label>Weekly Dose (mg):</label>
      <input id="weeklyDose" type="number" placeholder="mg">

      <label>Frequency (times per week):</label>
      <input id="frequency" type="number" placeholder="Times per week">

      <label>Dose per ml (mg/ml):</label>
      <input id="dosePerMl" type="number" placeholder="mg/ml">
    </div>

    <!-- Cycle info -->
    <div class="protocol-card">
      <h2>Cycle Info</h2>

      <label>Cycle Duration (weeks):</label>
      <input id="cycleDuration" type="number" placeholder="Weeks">

      <label>Start Date:</label>
      <input id="startDate" type="date">
    </div>

    <div class="protocol-actions">
      <button onclick="buildProtocol()">Build Protocol</button>
      <button onclick="location.href='index.html'">Back to Home</button>
    </div>

    <div id="calendarOutput"></div>
  </div>

  <!-- Auto-sync compound list -->
  <script src="compound-management.js"></script>

  <script>
    // Logo click animation + return home
    const logo = document.getElementById("protocolLogo");
    logo.addEventListener("click", () => {
      logo.classList.remove("tikn");
      void logo.offsetWidth;
      logo.classList.add("tikn");
      setTimeout(() => {
        location.href = "index.html";
      }, 300);
    });

    /* ------------------------------------------------------------
       Build Protocol + Calendar
       ------------------------------------------------------------ */
    function buildProtocol() {
      const compound = document.getElementById("compoundDropdown").value;
      const weeklyDose = Number(document.getElementById("weeklyDose").value);
      const frequency = Number(document.getElementById("frequency").value);
      const dosePerMl = Number(document.getElementById("dosePerMl").value);
      const cycleDuration = Number(document.getElementById("cycleDuration").value);
      const startDate = document.getElementById("startDate").value;

      if (!compound || !weeklyDose || !frequency || !dosePerMl || !cycleDuration || !startDate) {
        alert("Please fill out all fields.");
        return;
      }

      const doseMg = weeklyDose / frequency;
      const doseMl = (doseMg / dosePerMl).toFixed(2);

      const start = new Date(startDate);
      const totalDays = cycleDuration * 7;

      const doseInterval = Math.floor(7 / frequency);

      const doseDays = [];
      for (let i = 0; i < totalDays; i += doseInterval) {
        doseDays.push(i);
      }

      const calendarDiv = document.getElementById("calendarOutput");
      calendarDiv.innerHTML = "<h2>Protocol Calendar</h2>";

      const calendarGrid = document.createElement("div");
      calendarGrid.className = "calendar";

      for (let i = 0; i < totalDays; i++) {
        const dayDate = new Date(start);
        dayDate.setDate(start.getDate() + i);

        const dayDiv = document.createElement("div");
        dayDiv.className = "day";

        const isDoseDay = doseDays.includes(i);
        if (isDoseDay) {
          dayDiv.classList.add("dose-day");
          dayDiv.innerHTML = `
            ${dayDate.toDateString()}<br>
            Dose: ${doseMg} mg<br>
            (${doseMl} ml)
          `;
        } else {
          dayDiv.innerHTML = dayDate.toDateString();
        }

        const today = new Date();
        if (
          dayDate.getFullYear() === today.getFullYear() &&
          dayDate.getMonth() === today.getMonth() &&
          dayDate.getDate() === today.getDate()
        ) {
          dayDiv.classList.add("today");
        }

        calendarGrid.appendChild(dayDiv);
      }

      calendarDiv.appendChild(calendarGrid);
    }
  </script>

</body>
</html>
