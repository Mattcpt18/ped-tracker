<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Protocol Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-right-logo">
    <img id="protocolLogo" src="protocol-logo.png" alt="Protocol Logo">
  </div>

  <div class="track-container">
    <h1 class="track-title">Protocol Calendar</h1>

    <div id="calendarOutput"></div>

    <div class="protocol-actions">
      <button onclick="location.href='myprotocol.html'">View Protocol Details</button>
      <button class="secondary" onclick="location.href='index.html'">Back to Home</button>
    </div>
  </div>

  <script>
    const logo = document.getElementById("protocolLogo");
    logo.addEventListener("click", () => {
      logo.classList.remove("tikn");
      void logo.offsetWidth;
      logo.classList.add("tikn");
      setTimeout(() => location.href = "index.html", 300);
    });

    function renderCalendar() {
      const saved = localStorage.getItem("saved_protocol");
      const calendarDiv = document.getElementById("calendarOutput");

      if (!saved) {
        calendarDiv.innerHTML = "No protocol found. Please build a cycle first.";
        return;
      }

      const protocol = JSON.parse(saved);
      const cycleDuration = Number(protocol.cycleDuration);
      const startDate = protocol.startDate;

      if (!cycleDuration || !startDate) {
        calendarDiv.innerHTML = "Protocol data is incomplete.";
        return;
      }

      const start = new Date(startDate);
      const totalDays = cycleDuration * 7;

      const compoundColors = [
        "#38bdf8", "#34d399", "#fbbf24", "#f87171", "#a78bfa",
        "#fb7185", "#4ade80", "#facc15", "#2dd4bf", "#60a5fa"
      ];

      const doseMap = {};
      let compoundIndex = 0;

      protocol.compounds.forEach(c => {
        const weeklyDose = Number(c.weeklyDose);
        const frequency = Number(c.frequency);
        const dosePerMl = Number(c.dosePerMl);

        if (!c.name || !weeklyDose || !frequency || !dosePerMl) return;

        const doseMg = weeklyDose / frequency;
        const doseMl = (doseMg / dosePerMl).toFixed(2);
        const interval = Math.floor(7 / frequency);
        const color = compoundColors[compoundIndex] || "#38bdf8";
        compoundIndex++;

        for (let i = 0; i < totalDays; i += interval) {
          if (!doseMap[i]) doseMap[i] = [];
          doseMap[i].push({ compound: c.name, doseMg, doseMl, color });
        }
      });

      calendarDiv.innerHTML = "<h2>Your Saved Cycle Calendar</h2>";
      const calendarGrid = document.createElement("div");
      calendarGrid.className = "calendar";

      for (let i = 0; i < totalDays; i++) {
        const dayDate = new Date(start);
        dayDate.setDate(start.getDate() + i);

        const dayDiv = document.createElement("div");
        dayDiv.className = "day";

        if (doseMap[i]) {
          dayDiv.classList.add("dose-day");
          let html = `${dayDate.toDateString()}<br><br>`;
          doseMap[i].forEach(d => {
            html += `
              <div style="
                background: ${d.color};
                color: #0f172a;
                padding: 6px;
                border-radius: 6px;
                margin-bottom: 6px;
                font-weight: 600;
              ">
                ${d.compound}<br>
                ${d.doseMg} mg (${d.doseMl} ml)
              </div>
            `;
          });
          dayDiv.innerHTML = html;
        } else {
          dayDiv.innerHTML = dayDate.toDateString();
        }

        const today = new Date();
        if (
          dayDate.getFullYear() === today.getFullYear() &&
          dayDate.getMonth() === today.getMonth() &&
          dayDate.getDate() === today.getDate()
        ) {
          dayDiv.classList.add("today");
        }

        calendarGrid.appendChild(dayDiv);
      }

      calendarDiv.appendChild(calendarGrid);
    }

    document.addEventListener("DOMContentLoaded", renderCalendar);
  </script>
</body>
</html>
