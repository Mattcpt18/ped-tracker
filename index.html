<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Protocol Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F172A">
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</head>

<body>
  <div class="main-logo slide-in">
    <img src="protocol-logo.png" alt="Protocol Logo">
  </div>

  <h1 class="app-title">PROTOCOL</h1>

  <div class="main-buttons">
    <button onclick="location.href='track.html?view=myprotocol'">My Protocol</button>
    <button onclick="location.href='track.html?view=addprotocol'">Add Protocol</button>
  </div>
</body>
</html>
