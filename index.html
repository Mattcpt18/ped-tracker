<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Protocol Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
</script>

<style>
  body {
    margin: 0;
    background: #020617;
    color: #e5e7eb;
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    text-align: center;
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 40px;
  }

  .main-btn {
    background: #1e293b;
    border: 1px solid #334155;
    padding: 18px;
    border-radius: 14px;
    font-size: 20px;
    color: #e5e7eb;
    cursor: pointer;
    margin: 16px 0;
    transition: 0.2s;
  }

  .main-btn:hover {
    background: #38bdf8;
    color: #0f172a;
  }

  .corner-buttons {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .corner-btn {
    background:#1e293b;
    border:1px solid #334155;
    padding:8px 12px;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
    text-align:center;
  }

  .corner-btn:hover {
    background:#38bdf8;
    color:#0f172a;
  }
</style>
</head>

<body>

<div class="corner-buttons">
  <div id="remove-protocol" class="corner-btn">Remove</div>
  <div id="export-protocol" class="corner-btn">Export</div>
  <div id="edit-protocol" class="corner-btn">Edit</div>
</div>

<div class="container">
  <h1>Protocol Tracker</h1>

  <div class="main-btn" onclick="location.href='track.html?view=myprotocol'">
    My Protocol
  </div>

  <div class="main-btn" onclick="location.href='track.html?view=addprotocol'">
    Add Protocol
  </div>
</div>

<script>
document.getElementById("remove-protocol").onclick = () => {
  if (confirm("Remove saved protocol?")) {
    localStorage.removeItem("protocol");
    alert("Protocol removed.");
  }
};

document.getElementById("export-protocol").onclick = () => {
  const saved = localStorage.getItem("protocol");
  if (!saved) return alert("No protocol saved.");

  const items = JSON.parse(saved);
  let csv = "Item,Weekly Dose,Frequency,Per mL,mL per dose\n";
  items.forEach(i => {
    csv += `${i.name},${i.weekly},${i.freq},${i.perml},${i.mlPerDose.toFixed(2)}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "protocol.csv";
  a.click();
  URL.revokeObjectURL(url);
};

document.getElementById("edit-protocol").onclick = () => {
  const saved = localStorage.getItem("protocol");
  if (!saved) return alert("No protocol saved to edit.");
  location.href = "track.html?view=editprotocol";
};
</script>

</body>
</html>
