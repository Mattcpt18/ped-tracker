
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Protocol Tracker – Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    .app-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      padding: 20px;
    }
    .logo-main {
      width: 72px;
      height: auto;
      border-radius: 16px;
      margin-bottom: 20px;
    }
    .app-title {
      font-size: 26px;
      margin-bottom: 8px;
    }
    .app-subtitle {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    .main-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }
    .main-buttons button {
      padding: 12px 16px;
      border-radius: 999px;
      border: none;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
    }
    .main-buttons button.secondary {
      background: #1f2937;
      color: #e5e7eb;
      border: 1px solid #4b5563;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <img src="protocol-logo.png" alt="Protocol Logo" class="logo-main">
    <div class="app-title">Protocol Tracker</div>
    <div class="app-subtitle">Plan, save, and view your full PED protocol.</div>

    <div class="main-buttons">
      <button onclick="location.href='myprotocol.html'">My Protocol</button>
      <button onclick="location.href='buildcycle.html'">Build Cycle</button>
      <button class="secondary" onclick="location.href='addprotocol.html'">Add Single Compound</button>
      <button class="secondary" onclick="location.href='track.html'">Track Protocol Calendar</button>
    </div>
  </div>
</body>
</html>
